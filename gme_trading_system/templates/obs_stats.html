<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GME — OBS Stats Panel</title>
<style>
  /* Default theme: dark + gold (matches the original screenshot). */
  :root {
    --bg:     #0a0a0a;
    --ink:    #ffffff;
    --muted:  #9aa0a6;
    --accent: #ffe200;
    --green:  #2bd66a;
    --red:    #f25c5c;
    --rule:   #1f1f1f;
    --shadow: 0 4px 22px rgba(0,0,0,0.6);
  }
  /* White / paper theme — append ?theme=white to the URL. */
  :root[data-theme="white"] {
    --bg:     #ffffff;
    --ink:    #111111;
    --muted:  #6b7280;
    --accent: #b88500;
    --green:  #0e8a3e;
    --red:    #c2362f;
    --rule:   #e3e3e3;
    --shadow: 0 4px 22px rgba(0,0,0,0.10);
  }
  /* Mono theme — black/white with the gold replaced by white.
     Deltas stay green/red — that's the one place color is load-bearing.
     Append ?theme=mono to the URL. */
  :root[data-theme="mono"] {
    --bg:     #0a0a0a;
    --ink:    #ffffff;
    --muted:  #b0b0b0;
    --accent: #ffffff;
    --green:  #2bd66a;
    --red:    #f25c5c;
    --rule:   #2a2a2a;
    --shadow: 0 4px 22px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: transparent;       /* OBS browser source layers cleanly */
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: clamp(13px, 1.2vw + 9px, 16px);
  }
  .card {
    width: 100%;
    max-width: 800px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 18px 22px 14px;
    box-shadow: var(--shadow);
  }
  @media (max-width: 540px) {
    .card { padding: 14px 16px 12px; }
    .grid { grid-template-columns: 1fr; column-gap: 0; }
    .date { font-size: 17px !important; }
    .strip { font-size: 12px; }
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 10px; margin-bottom: 14px;
  }
  .date { font-weight: 700; font-size: 19px; letter-spacing: 0.2px; }
  .flag { height: 34px; width: auto; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    column-gap: 28px;
  }
  .col { display: flex; flex-direction: column; }
  .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0;
    border-bottom: 1px solid var(--rule);
  }
  .col .row:last-child { border-bottom: none; }
  .label { color: var(--accent); font-weight: 600; font-size: 14px; }
  .value { font-variant-numeric: tabular-nums; font-weight: 500; }
  .delta { margin-left: 6px; font-size: 13px; font-variant-numeric: tabular-nums; }
  .delta.pos { color: var(--green); }
  .delta.neg { color: var(--red); }
  /* Data strip — shared shape for Earnings / Max Pain / Dark Pool / FTDs.
     Typography matches the upper grid (.row): yellow Title-Case label,
     tabular-num values, no ALL-CAPS or extra tracking. Three-column grid
     so every rightmost value sits in the same x-position regardless of
     how many values the row has (2-value rows skip col 2 via .strip-two). */
  .strip {
    display: grid;
    grid-template-columns: 1fr 6em 7em;
    column-gap: 12px;
    align-items: baseline;
    margin-top: 6px; padding-top: 8px;
    border-top: 1px solid var(--rule);
  }
  .strip .label   { grid-column: 1; color: var(--accent); font-weight: 600; font-size: 14px; }
  .strip .sub     { color: var(--muted); font-weight: 500; margin-left: 6px; }
  .strip .value   { grid-column: 2; text-align: right;
                    font-variant-numeric: tabular-nums; font-weight: 500; }
  .strip .value-2 { grid-column: 3; text-align: right;
                    font-variant-numeric: tabular-nums; font-weight: 500; }
  /* 2-value rows: promote single value to col 3 so it lines up vertically
     with the rightmost value on the 3-value rows. */
  .strip.strip-two .value { grid-column: 3; }
  /* First strip after the stats grid needs more breathing room than
     strip-to-strip spacing. */
  .strip.strip-first { margin-top: 14px; }
  /* Side-by-side: channel info on the left, SUBSCRIBE button on the right. */
  .subscribe {
    margin: 14px 0 4px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
  }
  .subscribe .sub-info {
    display: flex; flex-direction: column; gap: 1px; min-width: 0;
  }
  .subscribe .sub-handle {
    color: var(--accent); font-weight: 600; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .subscribe .sub-count {
    color: var(--muted); font-variant-numeric: tabular-nums;
  }
  /* Styled YouTube-style SUBSCRIBE button. Mono theme keeps it white-on-black
     for the B&W look; other themes use the canonical YouTube red. */
  .subscribe .sub-btn {
    flex-shrink: 0;
    display: inline-block;
    background: #cc0000; color: #ffffff;
    text-decoration: none; font-weight: 700; letter-spacing: 1px;
    font-size: 12px; padding: 8px 14px; border-radius: 4px;
    text-transform: uppercase;
    transition: filter 120ms ease;
  }
  .subscribe .sub-btn:hover { filter: brightness(1.08); }
  :root[data-theme="mono"] .subscribe .sub-btn {
    background: #ffffff; color: #000000;
  }
  .flag { max-height: 38px; width: auto; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="date" id="date">—</div>
    <img class="flag" src="/obs/static/pirate.gif" alt="" onerror="this.style.display='none'">
  </div>

  <div class="grid">
    <div class="col">
      <div class="row"><span class="label">Market Cap</span>
        <span><span class="value" data-f="market_cap" data-fmt="bignum">—</span><span class="delta" data-f="market_cap_yoy_pct" data-fmt="pct"></span></span>
      </div>
      <div class="row"><span class="label">Revenue (ttm)</span>
        <span><span class="value" data-f="revenue_ttm" data-fmt="bignum">—</span><span class="delta" data-f="revenue_yoy_pct" data-fmt="pct"></span></span>
      </div>
      <div class="row"><span class="label">Net Income</span>
        <span><span class="value" data-f="net_income_ttm" data-fmt="bignum">—</span><span class="delta" data-f="net_income_yoy_pct" data-fmt="pct"></span></span>
      </div>
      <div class="row"><span class="label">EPS</span>
        <span><span class="value" data-f="eps_ttm" data-fmt="dec2">—</span><span class="delta" data-f="eps_yoy_pct" data-fmt="pct"></span></span>
      </div>
      <div class="row"><span class="label">Shares Out</span>
        <span><span class="value" data-f="shares_out" data-fmt="bignum">—</span><span class="delta" data-f="shares_out_yoy_pct" data-fmt="pct"></span></span>
      </div>
      <div class="row"><span class="label">PE Ratio</span>
        <span class="value" data-f="pe_ratio" data-fmt="dec2">—</span>
      </div>
    </div>
    <div class="col">
      <div class="row"><span class="label">Volume</span>
        <span class="value" data-f="day_volume" data-fmt="int">—</span>
      </div>
      <div class="row"><span class="label">Open</span>
        <span class="value" data-f="day_open" data-fmt="price">—</span>
      </div>
      <div class="row"><span class="label">Previous Close</span>
        <span class="value" data-f="prev_close" data-fmt="price">—</span>
      </div>
      <div class="row"><span class="label">Day's Range</span>
        <span class="value" data-f="day_range" data-fmt="range">—</span>
      </div>
      <div class="row"><span class="label">52-Week Range</span>
        <span class="value" data-f="week52_range" data-fmt="range">—</span>
      </div>
      <div class="row"><span class="label">Beta</span>
        <span class="value" data-f="beta" data-fmt="dec2">—</span>
      </div>
    </div>
  </div>

  <div class="strip strip-two strip-first">
    <span class="label">Earnings <span class="sub" data-f="earnings_quarter">—</span></span>
    <span class="value" data-f="next_earnings_date" data-fmt="dateMaybeProjected">—</span>
  </div>

  <div class="strip strip-two">
    <span class="label">Max Pain <span class="sub" data-f="max_pain_expiration" data-fmt="dateShort">—</span></span>
    <span class="value" data-f="max_pain_strike" data-fmt="usd">—</span>
  </div>

  <div class="strip strip-darkpool">
    <span class="label">Dark Pool <span class="sub" data-f="dark_pool_date" data-fmt="dateShort">—</span></span>
    <span class="value"   data-f="dark_pool_pct"    data-fmt="pctSimple">—</span>
    <span class="value-2" data-f="dark_pool_volume" data-fmt="int">—</span>
  </div>

  <div class="strip strip-ftd">
    <span class="label">FTDs <span class="sub" data-f="ftd_latest_date" data-fmt="dateShort">—</span></span>
    <span class="value"   data-f="ftd_30d_qty"    data-fmt="bignum">—</span>
    <span class="value-2" data-f="ftd_latest_qty" data-fmt="bignum">—</span>
  </div>

  <div class="subscribe">
    <div class="sub-info">
      <span class="sub-handle" data-f="yt_handle_at">@TroveIsland</span>
      <span class="sub-count"><span data-f="yt_subscribers" data-fmt="int">—</span> subscribers</span>
    </div>
    <a class="sub-btn" href="https://www.youtube.com/@TroveIsland?sub_confirmation=1" target="_blank" rel="noopener">SUBSCRIBE</a>
  </div>
</div>

<script>
  const REFRESH_MS = 30_000;

  // Theme via ?theme=white | ?theme=mono. Anything else falls through to the
  // default dark+gold look. OBS users add the param to their Browser Source URL.
  (() => {
    const t = new URLSearchParams(location.search).get("theme");
    if (t === "white" || t === "mono") document.documentElement.dataset.theme = t;
  })();

  // Stashed by render() before the format loop so date formatters can
  // consult sibling fields (e.g. dateMaybeProjected reads next_earnings_projected).
  let _payload = {};

  const fmt = {
    bignum(v) {
      if (v == null) return "—";
      const abs = Math.abs(v);
      if (abs >= 1e9) return (v / 1e9).toFixed(2) + "B";
      if (abs >= 1e6) return (v / 1e6).toFixed(2) + "M";
      if (abs >= 1e3) return (v / 1e3).toFixed(2) + "K";
      return String(Math.round(v));
    },
    int(v)   { return v == null ? "—" : v.toLocaleString("en-US"); },
    price(v) { return v == null ? "—" : Number(v).toFixed(2); },
    usd(v)   { return v == null ? "—" : "$" + Number(v).toFixed(2); },
    dec2(v)  { return v == null ? "—" : Number(v).toFixed(2); },
    pct(v) {
      if (v == null) return "";
      const sign = v > 0 ? "+" : "";
      return ` ${sign}${Number(v).toFixed(1)}%`;
    },
    pctSimple(v) {
      if (v == null) return "—";
      return Number(v).toFixed(2) + "%";
    },
    date(v) {
      if (!v) return "—";
      const d = new Date(v + "T12:00:00");
      if (isNaN(d)) return v;
      return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
    },
    dateOrdinal(v) {
      if (!v) return "—";
      const d = new Date(v + "T12:00:00");
      if (isNaN(d)) return v;
      const day = d.getDate();
      const month = d.toLocaleDateString("en-US", { month: "long" });
      const year = d.getFullYear();
      const j = day % 10, k = day % 100;
      const suffix = (k >= 11 && k <= 13) ? "th"
                   : j === 1 ? "st" : j === 2 ? "nd" : j === 3 ? "rd" : "th";
      return `${month} ${day}${suffix}, ${year}`;
    },
    dateShort(v) {
      if (!v) return "";
      const d = new Date(v + "T12:00:00");
      if (isNaN(d)) return v;
      // Title-case form ("May 13") to match upper-grid label style.
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    },
    // Like dateShort but prefixes "~" when the date is a projection
    // (yfinance calendar was stale, so fundamentals_feed rolled forward).
    dateMaybeProjected(v) {
      const base = fmt.dateShort(v);
      if (!base || base === "—") return base;
      return _payload.next_earnings_projected ? "~" + base : base;
    },
    range(v) { return v ?? "—"; },
  };

  function applyDeltaClass(el, raw) {
    el.classList.remove("pos", "neg");
    if (raw == null) return;
    if (raw > 0) el.classList.add("pos");
    else if (raw < 0) el.classList.add("neg");
  }

  function render(payload) {
    _payload = payload;
    document.getElementById("date").textContent = payload.date_header ?? "—";

    // Derived ranges
    payload.day_range = (payload.day_low != null && payload.day_high != null)
      ? `${Number(payload.day_low).toFixed(2)} - ${Number(payload.day_high).toFixed(2)}`
      : null;
    payload.week52_range = (payload.fifty_two_week_low != null && payload.fifty_two_week_high != null)
      ? `${Number(payload.fifty_two_week_low).toFixed(2)} - ${Number(payload.fifty_two_week_high).toFixed(2)}`
      : null;

    // Prefix the handle with @ when present (raw column doesn't include it).
    payload.yt_handle_at = payload.yt_handle ? "@" + payload.yt_handle : "";

    // GME fiscal year ends in late Jan / early Feb, so the calendar quarter
    // of the earnings date maps to the fiscal quarter being reported:
    //   Mar earnings  → Q4 (prior FY)   |  Jun → Q1  |  Sep → Q2  |  Dec → Q3
    payload.earnings_quarter = (() => {
      if (!payload.next_earnings_date) return "";
      const d = new Date(payload.next_earnings_date + "T12:00:00");
      if (isNaN(d)) return "";
      const m = d.getMonth();  // 0-11
      const y = d.getFullYear();
      if (m <= 3)  return `Q4 ${y - 1}`;
      if (m <= 6)  return `Q1 ${y}`;
      if (m <= 9)  return `Q2 ${y}`;
      return `Q3 ${y}`;
    })();

    for (const el of document.querySelectorAll("[data-f]")) {
      const key = el.dataset.f;
      const f   = el.dataset.fmt;
      const raw = payload[key];
      el.textContent = f ? fmt[f](raw) : (raw ?? "—");
      if (el.classList.contains("delta")) applyDeltaClass(el, raw);
    }

    // Hide the dark pool strip entirely when FINRA has nothing for us —
    // showing "DARK POOL — —" looks like a broken widget. Same treatment
    // for FTD (SEC bi-weekly publish, ~30-day lag).
    const hideIfEmpty = (selector, ...keys) => {
      const el = document.querySelector(selector);
      if (!el) return;
      const empty = keys.every(k => payload[k] == null);
      el.style.display = empty ? "none" : "";
    };
    hideIfEmpty(".strip-darkpool", "dark_pool_pct", "dark_pool_volume");
    hideIfEmpty(".strip-ftd",      "ftd_latest_qty", "ftd_30d_qty");
  }

  async function tick() {
    try {
      const r = await fetch("/obs/stats.json", { cache: "no-store" });
      if (!r.ok) return;
      render(await r.json());
    } catch (e) {
      console.warn("[obs-stats] fetch failed:", e);
    }
  }

  tick();
  setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
